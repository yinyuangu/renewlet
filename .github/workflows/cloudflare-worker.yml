name: Cloudflare Worker

# 测试/用户自管 Cloudflare 部署入口，保留 dev push 和手动运行；正式发布走 cloudflare-production。
on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

env:
  CI_WRANGLER_CONFIG: wrangler.generated.jsonc
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  WORKER_NAME: ${{ secrets.WORKER_NAME }}
  D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
  R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
  RENEWLET_VERSION: 0.1.0
  RENEWLET_COMMIT: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6.0.0
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve build time
        run: echo "RENEWLET_BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Check Cloudflare build
        run: pnpm check:cloudflare

      - name: Build Cloudflare assets
        run: pnpm build:cloudflare

      - name: Check deployment secrets
        id: deployment-secrets
        shell: bash
        run: |
          missing=()
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID WORKER_NAME D1_DATABASE_ID R2_BUCKET_NAME; do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            printf -v missing_list '%s, ' "${missing[@]}"
            missing_list="${missing_list%, }"
            echo "::notice title=Cloudflare deploy skipped::Missing GitHub Actions secrets: ${missing_list}. Build checks passed; add all required secrets to enable remote D1 migration and Worker deploy."
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Generate Cloudflare config
        if: steps.deployment-secrets.outputs.ready == 'true'
        run: pnpm cloudflare:config:ci

      - name: Apply D1 migrations
        if: steps.deployment-secrets.outputs.ready == 'true'
        run: pnpm exec wrangler d1 migrations apply DB --remote --config "$CI_WRANGLER_CONFIG"

      - name: Deploy Worker
        if: steps.deployment-secrets.outputs.ready == 'true'
        run: pnpm exec wrangler deploy --config "$CI_WRANGLER_CONFIG"
