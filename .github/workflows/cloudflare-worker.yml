name: Cloudflare Worker

# fork 用户和维护者测试环境共用的自管部署入口；缺少 secrets 时只跳过远端部署，仍保留构建验证。
on:
  push:
    branches:
      - dev
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI_WRANGLER_CONFIG: wrangler.generated.jsonc
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  WORKER_NAME: ${{ secrets.WORKER_NAME }}
  D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
  R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
  RENEWLET_COMMIT: ${{ github.sha }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6.0.0
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve build metadata
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          SHORT_SHA="${GITHUB_SHA::7}"
          {
            echo "RENEWLET_VERSION=${PACKAGE_VERSION}-dev+${SHORT_SHA}"
            echo "RENEWLET_BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } >> "$GITHUB_ENV"

      - name: Check Cloudflare build
        run: pnpm check:cloudflare

      - name: Build Cloudflare assets
        run: pnpm build:cloudflare

      - name: Check deployment secrets
        id: deployment-secrets
        shell: bash
        # fork/私有测试环境常缺远端 secrets；这里降级为 notice，保留构建检查但不碰真实 D1/R2。
        run: |
          set -euo pipefail

          missing=()
          for name in CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID WORKER_NAME D1_DATABASE_ID R2_BUCKET_NAME; do
            if [[ -z "${!name}" ]]; then
              missing+=("$name")
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            printf -v missing_list '%s, ' "${missing[@]}"
            missing_list="${missing_list%, }"
            echo "::notice title=Cloudflare deploy skipped::Missing GitHub Actions secrets: ${missing_list}. Build checks passed; add all required secrets to enable remote D1 migration and Worker deploy."
            exit 0
          fi

          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Generate Cloudflare config
        if: steps.deployment-secrets.outputs.ready == 'true'
        run: pnpm cloudflare:config:ci

      - name: Apply D1 migrations
        if: steps.deployment-secrets.outputs.ready == 'true'
        run: pnpm exec wrangler d1 migrations apply DB --remote --config "$CI_WRANGLER_CONFIG"

      - name: Prepare optional Worker secrets
        if: steps.deployment-secrets.outputs.ready == 'true'
        id: worker-secrets
        env:
          CLOUDFLARE_WORKER_SECRETS_FILE: ${{ runner.temp }}/renewlet-worker-secrets.json
          RENEWLET_GITHUB_TOKEN: ${{ secrets.RENEWLET_GITHUB_TOKEN }}
        run: node scripts/write-cloudflare-worker-secrets-file.mjs "$CLOUDFLARE_WORKER_SECRETS_FILE"

      - name: Deploy Worker
        if: steps.deployment-secrets.outputs.ready == 'true'
        shell: bash
        env:
          CLOUDFLARE_WORKER_SECRETS_FILE: ${{ steps.worker-secrets.outputs.secrets_file }}
          HAS_CLOUDFLARE_WORKER_SECRETS: ${{ steps.worker-secrets.outputs.has_secrets }}
        run: |
          set -euo pipefail
          deploy_args=(deploy --config "$CI_WRANGLER_CONFIG")
          if [[ "$HAS_CLOUDFLARE_WORKER_SECRETS" == "true" ]]; then
            deploy_args+=(--secrets-file "$CLOUDFLARE_WORKER_SECRETS_FILE")
          fi
          pnpm exec wrangler "${deploy_args[@]}"
