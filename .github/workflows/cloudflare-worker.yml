name: Cloudflare Worker

# 测试/用户自管 Cloudflare 部署入口，保留 dev push 和手动运行；正式发布走 cloudflare-production。
on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read

env:
  CI_WRANGLER_CONFIG: wrangler.generated.jsonc
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  WORKER_NAME: ${{ secrets.WORKER_NAME }}
  D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
  R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6.0.0
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Cloudflare config
        run: pnpm cloudflare:config:ci

      - name: Check Cloudflare build
        run: pnpm check:cloudflare

      - name: Build Cloudflare assets
        run: pnpm build:cloudflare

      - name: Apply D1 migrations
        run: pnpm exec wrangler d1 migrations apply DB --remote --config "$CI_WRANGLER_CONFIG"

      - name: Deploy Worker
        run: pnpm exec wrangler deploy --config "$CI_WRANGLER_CONFIG"
