name: Cloudflare Production

# 生产 Worker 只能由 stable release tag 间接调用；不要给这里加 workflow_dispatch。
on:
  workflow_call:
    inputs:
      version:
        description: "Stable release version without the leading v."
        required: true
        type: string

permissions:
  contents: read

env:
  CI_WRANGLER_CONFIG: wrangler.generated.jsonc
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  WORKER_NAME: ${{ secrets.WORKER_NAME }}
  D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
  R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

jobs:
  deploy:
    if: ${{ !contains(inputs.version, '-rc.') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # GitHub Environment 是生产部署的人审闸门，保护远端 D1 migration 和 Worker 覆盖。
    environment:
      name: production-cloudflare
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6.0.0
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve build time
        id: build-time
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Validate stable release version
        # 双保险：调用方已过滤 RC，但生产部署自身也拒绝候选版，避免复用 workflow 时误放行。
        run: |
          VERSION="$(node scripts/release.mjs validate-version "${{ inputs.version }}")"
          if [[ "$VERSION" == *"-rc."* ]]; then
            echo "Cloudflare production deploy only accepts stable versions." >&2
            exit 1
          fi

      - name: Generate Cloudflare config
        env:
          RENEWLET_VERSION: ${{ inputs.version }}
          RENEWLET_COMMIT: ${{ github.sha }}
          RENEWLET_BUILD_TIME: ${{ steps.build-time.outputs.value }}
        run: pnpm cloudflare:config:ci

      - name: Check Cloudflare build
        run: pnpm check:cloudflare

      - name: Build Cloudflare assets
        run: pnpm build:cloudflare

      - name: Apply D1 migrations
        run: pnpm exec wrangler d1 migrations apply DB --remote --config "$CI_WRANGLER_CONFIG"

      - name: Deploy Worker
        run: pnpm exec wrangler deploy --config "$CI_WRANGLER_CONFIG"
