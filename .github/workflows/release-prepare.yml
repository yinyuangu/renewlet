name: Release Prepare

# 从 dev 拉出 release/vX.Y.Z 并同步版本号；这一步只准备 PR，不打 tag、不发布产物。
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Stable SemVer version without the leading v, for example 0.1.0."
        required: true
        type: string
      base_branch:
        description: "Integration branch to release from."
        required: true
        default: dev
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.base_branch }}
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6.0.0
        with:
          node-version: 24

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate stable version
        # 同时校验 SemVer 和连续发布序列，避免 0.1.0 后误填 0.5.0 这类跳号版本。
        run: |
          node scripts/release.mjs validate-next-version "${{ inputs.version }}"

      - name: Sync workspace package versions
        run: node scripts/release.mjs sync-version "${{ inputs.version }}"

      - name: Create or update release pull request
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          RELEASE_BRANCH="release/v${VERSION}"
          PR_TITLE="release: v${VERSION}"
          BODY_FILE="$(mktemp)"

          cat > "$BODY_FILE" <<EOF
          ## Release v${VERSION}

          This PR promotes the release branch to \`main\` after RC validation.

          Checklist:
          - [ ] CI is green on \`${RELEASE_BRANCH}\`
          - [ ] \`v${VERSION}-rc.1\` has been tested
          - [ ] Docker deployment package has been checked
          - [ ] Cloudflare release build has passed
          EOF

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          if ! git diff --quiet; then
            git add package.json packages/*/package.json
            git commit -m "chore: prepare release v${VERSION}"
          fi

          # release PR 的核心差异是 dev 到 main 的提交历史；即使版本文件没有变化，也必须切分支并建 PR。
          git fetch origin "+refs/heads/${RELEASE_BRANCH}:refs/remotes/origin/${RELEASE_BRANCH}" || true
          git push --force-with-lease origin "HEAD:${RELEASE_BRANCH}"

          PR_URL="$(gh pr list --base main --head "${RELEASE_BRANCH}" --state open --json url --jq '.[0].url // ""')"
          if [[ -n "$PR_URL" ]]; then
            gh pr edit "$PR_URL" --title "$PR_TITLE" --body-file "$BODY_FILE"
          else
            PR_URL="$(gh pr create --base main --head "${RELEASE_BRANCH}" --title "$PR_TITLE" --body-file "$BODY_FILE")"
          fi

          if [[ -z "$PR_URL" ]]; then
            echo "Release pull request was not created or found." >&2
            exit 1
          fi

          echo "Release pull request: ${PR_URL}"
